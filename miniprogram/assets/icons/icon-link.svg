<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
  <rect width="52" height="52" rx="3" fill="#577aee"/>
  <!-- Link icon: two interlocking chain links -->
  <g fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left chain -->
    <rect x="12" y="20" width="12" height="12" rx="3"/>
    <!-- Right chain -->
    <rect x="28" y="20" width="12" height="12" rx="3"/>
    <!-- Connection -->
    <line x1="20" y1="26" x2="32" y2="26"/>
  </g>
</svg>