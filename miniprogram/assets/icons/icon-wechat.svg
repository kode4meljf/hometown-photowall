<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
  <!-- 绿色圆角方形背景（WXSS 端控制 border-radius: 10px） -->
  <!-- 内部白色空心圆圈 + 两个白色实心小圆点 -->
  <g fill="#fff">
    <!-- 白色空心圆圈 -->
    <circle cx="26" cy="26" r="14" fill="none" stroke="#fff" stroke-width="2"/>
    <!-- 左侧白点 -->
    <circle cx="21" cy="26" r="2.5"/>
    <!-- 右侧白点 -->
    <circle cx="31" cy="26" r="2.5"/>
  </g>
</svg>