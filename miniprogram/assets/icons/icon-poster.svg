<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
  <rect width="52" height="52" rx="3" fill="#ff6b6b"/>
  <!-- Poster/frame icon: landscape photo with mountains -->
  <rect x="10" y="14" width="32" height="24" rx="3" fill="none" stroke="#fff" stroke-width="2.2"/>
  <!-- Mountain line inside frame -->
  <polyline points="10,34 17,26 23,30 29,22 36,28 42,24 42,38 10,38" fill="rgba(255,255,255,0.6)" stroke="none"/>
  <!-- Sun circle -->
  <circle cx="35" cy="20" r="3" fill="rgba(255,255,255,0.8)"/>
</svg>